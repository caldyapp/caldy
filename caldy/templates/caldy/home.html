{% extends "caldy/base.html" %}

{% block title %}Home — Caldy{% endblock %}

{% block content %}
<div class="container">
  <div class="row">
    <div class="col-12 col-md-8">
      <div class="mt-5">
        <p class="small-caps mb-1">caldy</p>
        <h1 style="font-size: 32px;">welcome{% if user.is_authenticated %}, {{ user.full_name|default:user.email }}{% endif %}.</h1>
        <p class="text-muted mt-2">you are signed in.</p>
      </div>
      <hr class="retro" />
      <p style="font-size: 13px;">
        <a href="{% url 'logout' %}">sign out</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
